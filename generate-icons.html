<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Icon Generator – Crescendo</title>
<style>
  body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; background: #f0f4f8; }
  h1 { font-size: 1.2rem; color: #1e3a5f; }
  p  { color: #555; font-size: 0.9rem; }
  .step { background: #fff; border: 1px solid #d0dce8; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; }
  .step h2 { font-size: 0.95rem; margin: 0 0 8px; color: #1e3a5f; }
  .btn {
    display: block; width: 100%; margin: 8px 0; padding: 12px 16px;
    background: #0EA5E9; color: #fff; border: none; border-radius: 8px;
    font-size: 1rem; cursor: pointer; text-align: left;
  }
  .btn:hover { background: #0284c7; }
  .btn:disabled { background: #a0c4d8; cursor: not-allowed; }
  .btn span { float: right; opacity: 0.7; font-size: 0.85rem; }
  #preview { max-width: 130px; display: none; border-radius: 8px; margin-top: 8px; }
  canvas { display: none; }
  .ok { color: #16a34a; font-size: 0.85rem; margin-top: 4px; }
</style>
</head>
<body>
<h1>Crescendo – Icons generieren</h1>

<div class="step">
  <h2>Schritt 1 – Logo auswählen</h2>
  <p style="margin:0 0 8px">Wähle <strong>logo2.png</strong> aus dem Projektordner:</p>
  <input type="file" id="file-input" accept="image/*">
  <img id="preview" alt="Vorschau">
  <p id="file-ok" class="ok" style="display:none">✓ Logo geladen – jetzt Icons herunterladen:</p>
</div>

<div class="step">
  <h2>Schritt 2 – Icons herunterladen &amp; in den Projektordner speichern</h2>
  <button class="btn" id="btn-favicon"   onclick="download('favicon.png', 32)"    disabled>favicon.png <span>32 × 32 px</span></button>
  <button class="btn" id="btn-apple"     onclick="download('apple-touch-icon.png', 180)" disabled>apple-touch-icon.png <span>180 × 180 px</span></button>
  <button class="btn" id="btn-192"       onclick="download('icon-192.png', 192)"   disabled>icon-192.png <span>192 × 192 px</span></button>
  <button class="btn" id="btn-512"       onclick="download('icon-512.png', 512)"   disabled>icon-512.png <span>512 × 512 px</span></button>
</div>

<canvas id="c"></canvas>

<script>
let loadedImage = null;

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    loadedImage = img;
    const preview = document.getElementById('preview');
    preview.src = url;
    preview.style.display = 'block';
    document.getElementById('file-ok').style.display = 'block';
    ['btn-favicon','btn-apple','btn-192','btn-512'].forEach(id => {
      document.getElementById(id).disabled = false;
    });
  };
  img.src = url;
});

function download(filename, size) {
  if (!loadedImage) return;
  const canvas = document.getElementById('c');
  canvas.width  = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  ctx.drawImage(loadedImage, 0, 0, size, size);
  canvas.toBlob(pngBlob => {
    const a = document.createElement('a');
    a.href     = URL.createObjectURL(pngBlob);
    a.download = filename;
    a.click();
  }, 'image/png');
}
</script>
</body>
</html>
